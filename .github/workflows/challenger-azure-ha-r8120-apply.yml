name: Challenger Azure HA Apply R8120

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customers/Challenger/azure/ha-r8120

    env:
      TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
   
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate-lab" \
            -backend-config="storage_account_name=karanktfstate001" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=challenger-azure-ha-r8120.tfstate"
            
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan
