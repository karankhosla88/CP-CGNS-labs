name: Challenger Azure SMS Plan

on:
  workflow_dispatch:
  push:
    paths:
      - 'customers/Challenger/azure/sms/**'
      - '.github/workflows/challenger-azure-sms-plan.yml'

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customers/Challenger/azure/sms

    env:
      TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Show Terraform version
        run: terraform version

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate-lab" \
            -backend-config="storage_account_name=karanktfstate001" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=challenger-azure-sms.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -no-color -out=tfplan -detailed-exitcode
          code=$?
          if [ $code -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Show Terraform Plan
        run: terraform show -no-color tfplan
