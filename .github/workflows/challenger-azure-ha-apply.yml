name: Challenger Azure HA Apply

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customers/Challenger/azure/ha

    env:
      TF_VAR_client_secret: ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ vars.AZURE_CLIENT_ID }}",
             "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
             "subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}",
             "tenantId":"${{ vars.AZURE_TENANT_ID }}"}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate-lab" \
            -backend-config="storage_account_name=karanktfstate001" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=challenger-azure-ha.tfstate"
            
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan
